# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# max length of characters to use for "slug" in the path
truncate_slug_length = 40

# set to 'true' to search for newer versions in directory histories;
# this is default in 1.9+
recursive_version_check = true

# the output encoding used when writing new migration files
output_encoding = utf-8

# We do not hardcode sqlalchemy.url here because we dynamically load it 
# from our config.py module in env.py.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5.5s: %(message)s
datefmt = %H:%M:%S
